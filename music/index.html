<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Little Starlight</title>
<style>
  body {
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    font-family: sans-serif;
    padding: 20px;
  }
  .disc {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    margin: 20px auto;
    background-image: url("ZetaWave.png");
    background-size: cover;
    animation: rotate 10s linear infinite;
    animation-play-state: paused;
  }
  @keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .disc.playing {
    animation-play-state: running;
  }
  #lyric {
    height: 40px;
    line-height: 40px;
    font-size: 16px;
  }
  #playBtn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    font-size: 22px;
  }
  audio {
    display: none;
  }
</style>
</head>

<body>
  <h2>Little Starlight</h2>
  <p>作曲：ZetaWave</p>

  <div class="disc" id="disc"></div>
  <div id="lyric">歌词加载中...</div>
  <button id="playBtn">▶</button>

  <audio id="audio" src="Little Starlight.mp3">

<script>
  const audio = document.getElementById('audio');
  const btn = document.getElementById('playBtn');
  const disc = document.getElementById('disc');
  const lyric = document.getElementById('lyric');

  // 最简单的歌词（你自己替换成你的 LRC）
  const lrc = `
[00:00.00]Little Starlight
[00:05.00]作曲：ZetaWave
[00:10.00]星光轻轻闪烁
[00:15.00]照亮黑夜的角落
`;

  // 解析歌词
  let lines = [];
  lrc.trim().split('\n').forEach(line => {
    let m = line.match(/\[(\d+):(\d+\.\d+)\](sslocal://flow/file_open?url=.%2A&flow_extra=eyJsaW5rX3R5cGUiOiJjb2RlX2ludGVycHJldGVyIn0=)/);
    if (m) lines.push({ t: m[1]*60 + +m[2], txt: m[3] });
  });

  // 歌词同步
  audio.ontimeupdate = () => {
    let t = audio.currentTime;
    for(let i=lines.length-1; i>=0; i--){
      if(t >= lines[i].t){
        lyric.innerText = lines[i].txt;
        break;
      }
    }
  };

  // 自动同步按钮（通知栏控制也会变）
  function updateUI() {
    if (audio.paused) {
      btn.innerText = '▶';
      disc.classList.remove('playing');
    } else {
      btn.innerText = 'l l';
      disc.classList.add('playing');
    }
  }

  audio.addEventListener('play', updateUI);
  audio.addEventListener('pause', updateUI);
  btn.onclick = () => audio.paused ? audio.play() : audio.pause();
</script>
</body>
</html>
