<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Starlight</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: sans-serif;
  }
  body {
    background: #121212;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .player-box {
    background: #1e1e1e;
    padding: 30px;
    border-radius: 24px;
    text-align: center;
    width: 100%;
    max-width: 400px;
  }
  .title {
    font-size: 24px;
    margin-bottom: 6px;
  }
  .composer {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 20px;
  }

  .disc {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    margin: 20px auto;
    position: relative;
    animation: rotate 10s linear infinite;
    animation-play-state: paused;
    background-image: url("ZetaWave.png");
    background-size: cover;
    background-position: center;
  }
  .disc::before {
    content: '';
    position: absolute;
    width: 40px;
    height: 40px;
    background: #222;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .disc.playing {
    animation-play-state: running;
  }
  @keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* 歌词区域 */
  .lyric-box {
    height: 60px;
    margin: 20px 0;
    overflow: hidden;
    text-align: center;
  }
  .lyric {
    transition: all 0.3s;
    line-height: 30px;
  }
  .lyric p {
    margin: 0;
    padding: 0;
  }
  .lyric .active {
    color: #fff;
    font-size: 16px;
    font-weight: bold;
  }

  .play-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
  }
  audio {
    display: none;
  }
</style>

<body>
<div class="player-box">
  <h2 class="title">Little Starlight</h2>
  <p class="composer">作曲：ZetaWave</p>

  <div class="disc" id="disc"></div>

  <div class="lyric-box">
    <div class="lyric" id="lyric">加载歌词中...</div>
  </div>

  <button class="play-btn" id="playBtn">▶</button>
  <audio id="audio" src="Little Starlight.mp3">
</div>

<script>
  const audio = document.getElementById('audio');
  const disc = document.getElementById('disc');
  const btn = document.getElementById('playBtn');
  const lyricEl = document.getElementById('lyric');

  let lyricList = [];
  let currentLine = -1;

  // 加载 LRC 歌词
  fetch('Little Starlight.lrc')
    .then(res => res.text())
    .then(text => {
      lyricList = parseLRC(text);
    });

  // LRC 解析
  function parseLRC(text) {
    let lines = text.split('\n');
    let arr = [];
    let reg = /\[(\d+):(\d+\.\d+)\](sslocal://flow/file_open?url=.%2A&flow_extra=eyJsaW5rX3R5cGUiOiJjb2RlX2ludGVycHJldGVyIn0=)/;
    lines.forEach(line => {
      let m = line.match(reg);
      if (m) {
        let time = parseInt(m[1]) * 60 + parseFloat(m[2]);
        arr.push({ time, text: m[3] });
      }
    });
    return arr;
  }

  // 歌词同步滚动
  audio.addEventListener('timeupdate', () => {
    if (lyricList.length === 0) return;
    let now = audio.currentTime;
    let idx = -1;
    for (let i = 0; i < lyricList.length; i++) {
      if (now >= lyricList[i].time) idx = i;
    }
    if (idx !== currentLine && idx >= 0) {
      currentLine = idx;
      lyricEl.innerHTML = `<p class="active">${lyricList[idx].text}</p>`;
    }
  });

  // 播放暂停切换
  btn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
      disc.classList.add('playing');
      btn.innerText = 'l l';
    } else {
      audio.pause();
      disc.classList.remove('playing');
      btn.innerText = '▶';
    }
  });
</script>
</body>
</html>
