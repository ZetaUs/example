<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Starlight</title>
<style>
  body{text-align:center;background:#1a1a1a;color:#fff;font-family:sans-serif;padding:20px;}
  .disc{
    width:200px;height:200px;border-radius:50%;
    background:url(ZetaWave.png) center/cover;
    margin:20px auto;
    animation:rot 10s linear infinite;
    animation-play-state:paused;
  }
  @keyframes rot{to{transform:rotate(360deg)}}
  .disc.play{animation-play-state:running}
  #lyric{height:50px;line-height:50px;font-size:16px;}
  #btn{width:60px;height:60px;border-radius:50%;border:none;font-size:22px;}
</style>
</head>

<body>
  <h2>Little Starlight</h2>
  <p>ZetaWave</p>
  <div class="disc" id="disc"></div>
  <div id="lyric">...</div>
  <button id="btn">▶</button>

  <audio id="audio" src="Little Starlight.mp3">

<script>
const a = document.getElementById('audio');
const b = document.getElementById('btn');
const d = document.getElementById('disc');
const l = document.getElementById('lyric');

// 你的完整歌词
const lrctxt = `[ti:Little Starlight]
[ar:ZetaWave]
[al:English song]
[by:ZetaWave]
[offset:0]
[length: 03:24.504]
[00:01.000]Little Starlight - ZetaWave
[00:02.000]write words for a song:ZetaWave
[00:03.000]write music:ZetaWave
[00:05.439] The wind blows softly past the window pane
[00:10.444] I write my heart out into a simple refrain
[00:16.525] Ordinary days still have their warmth
[00:22.971] I take my time, walk through every storm
[00:32.673] Melodies repeat inside my head
[00:37.358] Dreams are living where my heart has led
[00:43.388] Even when the rain and wind collide
[00:49.926] I hold on tight to courage deep inside
[00:57.243] I’m a little starlight in the night
[01:02.639] Every time I fall, I stand up tall
[01:14.165] Believe tomorrow will be bright for all
[01:27.929] The same old songs play inside my ears
[01:32.653] Young hopes live on through all the years
[01:38.318] Even if the road ahead is unclear
[01:44.322] I keep on going, chasing what I hold dear
[01:52.164] I’m a little starlight in the night
[01:57.565] Shining soft, but trying hard to light
[02:04.262] Every time I fall, I stand up tall
[02:07.289] Believe tomorrow will be bright for all
[02:14.301] Moving forward, no matter how far the road
[02:33.665] With love in my heart, light in my soul
[02:40.132] I'm a little starlight in the night
[02:47.747] Shining soft, trying hard to lie to lie
[02:52.266] Every time I fall, every time I stand up fall
[02:57.356] But tomorrow will be bright, for us
[03:18.290]Goodbye!`;

// 解析歌词
const lines=[];
lrctxt.split('\n').forEach(line=>{
  const m=line.match(/\[(\d+):(\d+)\.(\d+)\](sslocal://flow/file_open?url=.%2A&flow_extra=eyJsaW5rX3R5cGUiOiJjb2RlX2ludGVycHJldGVyIn0=)/);
  if(m){
    const t=+m[1]*60 + +m[2] + +m[3]/1000;
    lines.push({t,txt:m[4].trim()});
  }
});

// 歌词同步
a.ontimeupdate=()=>{
  const t=a.currentTime;
  for(let i=lines.length-1;i>=0;i--){
    if(t>=lines[i].t){
      l.innerText=lines[i].txt;
      break;
    }
  }
};

// 按钮和通知栏同步
function update(){
  if(a.paused){
    b.textContent='▶';
    d.classList.remove('play');
  }else{
    b.textContent='ll';
    d.classList.add('play');
  }
}

a.addEventListener('play',update);
a.addEventListener('pause',update);
b.onclick=()=>a.paused?a.play():a.pause();
</script>
</body>
</html>
