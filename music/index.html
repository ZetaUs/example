<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Little Starlight</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: sans-serif;
  }
  body {
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    padding: 30px 20px;
  }
  h2 {
    font-size: 24px;
    margin-bottom: 6px;
  }
  p {
    font-size: 14px;
    color: #ccc;
    margin-bottom: 20px;
  }

  /* 黑胶唱片 */
  .disc {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    margin: 20px auto;
    background-image: url("ZetaWave.png");
    background-size: cover;
    background-position: center;
    animation: rotate 10s linear infinite;
    animation-play-state: paused;
  }
  @keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .disc.playing {
    animation-play-state: running;
  }

  /* 歌词 */
  #lyric {
    height: 50px;
    line-height: 50px;
    font-size: 16px;
    color: #fff;
    margin: 10px 0 20px;
  }

  /* 按钮 */
  #playBtn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    font-size: 24px;
    cursor: pointer;
  }

  audio {
    display: none;
  }
</style>
</head>

<body>
  <h2>Little Starlight</h2>
  <p>作曲 / 作词：ZetaWave</p>

  <div class="disc" id="disc"></div>
  <div id="lyric">加载歌词...</div>
  <button id="playBtn">▶</button>

  <audio id="audio" src="Little Starlight.mp3">

<script>
  const audio = document.getElementById('audio');
  const btn   = document.getElementById('playBtn');
  const disc  = document.getElementById('disc');
  const lyric = document.getElementById('lyric');

  // ====================== 你的完整 LRC 歌词 ======================
  const lrcText = `
[ti:Little Starlight]
[ar:ZetaWave]
[al:English song]
[by:ZetaWave]
[offset:0]
[length: 03:24.504]
[00:01.000]Little Starlight - ZetaWave
[00:02.000]write words for a song:ZetaWave
[00:03.000]write music:ZetaWave
[00:05.439] The wind blows softly past the window pane
[00:10.444] I write my heart out into a simple refrain
[00:16.525] Ordinary days still have their warmth
[00:22.971] I take my time, walk through every storm
[00:32.673] Melodies repeat inside my head
[00:37.358] Dreams are living where my heart has led
[00:43.388] Even when the rain and wind collide
[00:49.926] I hold on tight to courage deep inside
[00:57.243] I’m a little starlight in the night
[01:02.639] Every time I fall, I stand up tall
[01:14.165] Believe tomorrow will be bright for all
[01:27.929] The same old songs play inside my ears
[01:32.653] Young hopes live on through all the years
[01:38.318] Even if the road ahead is unclear
[01:44.322] I keep on going, chasing what I hold dear
[01:52.164] I’m a little starlight in the night
[01:57.565] Shining soft, but trying hard to light
[02:04.262] Every time I fall, I stand up tall
[02:07.289] Believe tomorrow will be bright for all
[02:14.301] Moving forward, no matter how far the road
[02:33.665] With love in my heart, light in my soul
[02:40.132] I'm a little starlight in the night
[02:47.747] Shining soft, trying hard to lie to lie
[02:52.266] Every time I fall, every time I stand up fall
[02:57.356] But tomorrow will be bright, for us
[03:18.290]Goodbye!
`;

  // 解析 LRC
  function parseLRC(text) {
    const lines = text.trim().split('\n');
    const list  = [];
    const reg   = /\[(\d+):(\d+)\.(\d+)\](sslocal://flow/file_open?url=.%2A&flow_extra=eyJsaW5rX3R5cGUiOiJjb2RlX2ludGVycHJldGVyIn0=)/;

    lines.forEach(line => {
      const m = line.match(reg);
      if (m) {
        const min   = parseInt(m[1], 10);
        const sec   = parseInt(m[2], 10);
        const msec  = parseInt(m[3], 10);
        const time  = min * 60 + sec + msec / 1000;
        const txt   = m[4].trim();
        list.push({ time, txt });
      }
    });
    return list;
  }

  const lyricList = parseLRC(lrcText);
  let lastLine = -1;

  // 歌词同步
  audio.addEventListener('timeupdate', () => {
    const t = audio.currentTime;
    let currLine = -1;

    for (let i = 0; i < lyricList.length; i++) {
      if (t >= lyricList[i].time) {
        currLine = i;
      }
    }

    if (currLine !== -1 && currLine !== lastLine) {
      lastLine = currLine;
      lyric.innerText = lyricList[currLine].txt;
    }
  });

  // ============== 关键：自动同步按钮和唱片状态 ==============
  function updateUI() {
    if (audio.paused) {
      btn.textContent = '▶';
      disc.classList.remove('playing');
    } else {
      btn.textContent = 'l l';
      disc.classList.add('playing');
    }
  }

  // 监听系统播放/暂停（通知栏控制也生效）
  audio.addEventListener('play', updateUI);
  audio.addEventListener('pause', updateUI);

  // 点击按钮
  btn.onclick = () => {
    if (audio.paused) {
      audio.play().catch(e => console.log(e));
    } else {
      audio.pause();
    }
  };
</script>
</body>
</html>
