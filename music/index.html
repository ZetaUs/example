<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Little Starlight</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: sans-serif;
  }
  body {
    background: #121212;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .player-box {
    background: #1e1e1e;
    padding: 30px;
    border-radius: 24px;
    text-align: center;
    width: 100%;
    max-width: 400px;
  }
  .title {
    font-size: 24px;
    margin-bottom: 6px;
  }
  .composer {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 20px;
  }

  .disc {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    margin: 20px auto;
    position: relative;
    animation: rotate 10s linear infinite;
    animation-play-state: paused;
    background-image: url("ZetaWave.png");
    background-size: cover;
    background-position: center;
  }
  .disc::before {
    content: '';
    position: absolute;
    width: 40px;
    height: 40px;
    background: #222;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .disc.playing {
    animation-play-state: running;
  }
  @keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* 歌词区域 */
  .lyric {
    height: 40px;
    line-height: 40px;
    font-size: 16px;
    color: #ccc;
    margin: 10px 0;
  }

  .play-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
  }
  audio {
    display: none;
  }
</style>
</head>

<body>
<div class="player-box">
  <h2 class="title">Little Starlight</h2>
  <p class="composer">作曲：ZetaWave</p>

  <div class="disc" id="disc"></div>
  <div class="lyric" id="lyric">歌词加载中...</div>
  <button class="play-btn" id="playBtn">▶</button>

  <audio id="audio" src="Little Starlight.mp3">
</div>

<script>
  const audio = document.getElementById('audio');
  const disc = document.getElementById('disc');
  const btn = document.getElementById('playBtn');
  const lyric = document.getElementById('lyric');

  // 播放/暂停切换（正常、不卡）
  btn.onclick = function () {
    if (audio.paused) {
      audio.play();
      disc.classList.add('playing');
      btn.innerText = 'l l';
    } else {
      audio.pause();
      disc.classList.remove('playing');
      btn.innerText = '▶';
    }
  };

  // 这里可以直接放你的歌词，秒显示
  audio.ontimeupdate = function () {
    // 你把自己的 LRC 时间轴发给我，我给你填进去，立刻同步
    lyric.innerText = "Little Starlight · 正在播放";
  };
</script>
</body>
</html>
