<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Starlight 音乐播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #121212;
            color: #f0f0f0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .player-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 灰色方块播放器 */
        .player {
            background-color: #2d2d2d;
            border-radius: 20px;
            padding: 25px 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid #3a3a3a;
        }
        
        /* 唱片样式 */
        .record-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
        }
        
        .record {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #000;
            border: 6px solid #ffffff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
            transition: transform 0.8s ease;
        }
        
        /* 唱片动画 - 旋转 */
        .record.playing {
            animation: rotate 10s linear infinite;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .record-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background-color: #ffffff;
            border-radius: 50%;
            z-index: 2;
        }
        
        /* 歌曲信息 */
        .song-info {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
        }
        
        .song-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            color: #ffffff;
        }
        
        .song-author {
            font-size: 14px;
            color: #aaa;
            font-weight: 400;
        }
        
        /* 歌词区域 */
        .lyrics-container {
            width: 100%;
            height: 140px;
            overflow: hidden;
            position: relative;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            margin-bottom: 15px;
            padding: 8px;
        }
        
        .lyrics-mask {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 25px;
            background: linear-gradient(to bottom, rgba(45, 45, 45, 0.9), transparent);
            z-index: 2;
            border-radius: 10px 10px 0 0;
        }
        
        .lyrics-mask.bottom {
            top: auto;
            bottom: 0;
            background: linear-gradient(to top, rgba(45, 45, 45, 0.9), transparent);
            border-radius: 0 0 10px 10px;
        }
        
        .lyrics-content {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            transition: top 0.5s ease;
            padding: 0 8px;
        }
        
        .lyric-line {
            font-size: 15px;
            line-height: 1.6;
            text-align: center;
            color: #888;
            margin: 4px 0;
            padding: 5px 8px;
            border-radius: 5px;
            transition: all 0.3s ease;
            opacity: 0.6;
        }
        
        .lyric-line.current {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            opacity: 1;
            background-color: rgba(52, 152, 219, 0.15);
            text-shadow: 0 0 8px rgba(52, 152, 219, 0.5);
        }
        
        /* 播放/暂停状态指示器 */
        .play-state {
            margin: 5px 0 15px 0;
            font-size: 13px;
            color: #3498db;
            font-weight: 500;
        }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .control-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background-color: #3498db;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }
        
        .control-btn:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }
        
        .control-btn:active {
            transform: scale(0.98);
        }
        
        .control-btn:disabled {
            background-color: #2c3e50;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 进度条 */
        .progress-container {
            width: 100%;
        }
        
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            color: #aaa;
        }
        
        .progress-bar {
            width: 100%;
            height: 5px;
            background-color: #444;
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }
        
        .progress {
            height: 100%;
            background-color: #3498db;
            width: 0%;
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        
        /* 音乐文件状态提示 */
        .file-status {
            margin-top: 15px;
            padding: 8px 12px;
            background-color: #1a1a1a;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            color: #aaa;
            max-width: 100%;
        }
        
        .file-status.error {
            color: #e74c3c;
            background-color: rgba(231, 76, 60, 0.1);
        }
        
        .file-status.success {
            color: #2ecc71;
            background-color: rgba(46, 204, 113, 0.1);
        }
        
        .file-status.loading {
            color: #3498db;
            background-color: rgba(52, 152, 219, 0.1);
        }
        
        /* 歌词状态提示 */
        .lyrics-status {
            margin-top: 10px;
            font-size: 12px;
            color: #777;
            text-align: center;
        }
        
        /* 加载指示器 */
        .loading-indicator {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loading-indicator.active {
            display: flex;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #3498db;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式调整 */
        @media (max-width: 480px) {
            .player {
                padding: 20px 15px;
                border-radius: 16px;
            }
            
            .record-container {
                width: 130px;
                height: 130px;
            }
            
            .song-title {
                font-size: 20px;
            }
            
            .lyrics-container {
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <!-- 加载指示器 -->

    <div class="player-container">

            <div class="lyrics-container" id="lyricsContainer">

                <div class="lyrics-mask bottom"></div>

            <!-- 播放状态指示器 -->
            <div class="play-state" id="playState">准备播放</div>
            
            <!-- 控制按钮 -->

            <!-- 进度条 -->
            <div class="progress-container">

            <!-- 歌词状态提示 -->
            <div class="lyrics-status" id="lyricsStatus">正在加载歌词...</div>
        </div>
        
        <!-- 音乐文件状态 -->
        <div class="file-status loading" id="fileStatus">
            正在快速加载音乐文件...
        </div>
    </div>

                    lyricLine.id = `lyric-${index}`;
                    lyricLine.textContent = lyric.text;
                    lyricLine.dataset.time = lyric.time;
                    lyricsContent.appendChild(lyricLine);
                });
                
                // 添加更多占位行
                for (let i = 0; i < 2; i++) {
                    const emptyLine = document.createElement('div');
                    emptyLine.className = 'lyric-line';
                    emptyLine.textContent = '';
                    lyricsContent.appendChild(emptyLine);
                }
                
                updateLyricsDisplay(0);
                lyricsStatus.textContent = `已加载 ${lyrics.length} 行歌词`;
            }
            
            // 更新歌词显示
            function updateLyricsDisplay(currentTime) {
                if (lyrics.length === 0) return;
                
                let newIndex = 0;
                for (let i = lyrics.length - 1; i >= 0; i--) {
                    if (currentTime >= lyrics[i].time) {
                        newIndex = i;
                        break;
                    }
                }
                
                if (newIndex !== currentLyricIndex) {
                    const prevLine = document.getElementById(`lyric-${currentLyricIndex}`);
                    if (prevLine) {
                        prevLine.classList.remove('current');
                    }
                    
                    const currentLine = document.getElementById(`lyric-${newIndex}`);
                    if (currentLine) {
                        currentLine.classList.add('current');
                        
                        const lineHeight = currentLine.offsetHeight;
                        const containerHeight = lyricsContainer.clientHeight;
                        const lineTop = currentLine.offsetTop;
                        const targetScroll = lineTop - (containerHeight / 2) + (lineHeight / 2);
                        
                        lyricsContent.style.top = `calc(50% - ${targetScroll}px)`;

                    currentLyricIndex = newIndex;
                }
            }
            
            // 立即初始化歌词

                if (isNaN(seconds)) return "0:00";
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }
            
            // 更新总时长

                const duration = audio.duration;
                if (!isNaN(duration)) {
                    durationEl.textContent = formatTime(duration);
                }
            }

                loadingIndicator.classList.add('active');
            }
            
            // 隐藏加载指示器

                loadingIndicator.classList.remove('active');
