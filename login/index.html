<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>众志通讯 - 会员登录</title>
  <link rel="icon" href="../zztx.ico" type="image/x-icon">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei", "微软雅黑", Arial, sans-serif}
    body{background:#f6f8fa;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
    .box{max-width:400px;width:100%;background:#fff;border-radius:14px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
    .tabs{display:flex;margin-bottom:24px;border-bottom:1px solid #eee}
    .tab{flex:1;text-align:center;padding:12px;font-size:16px;cursor:pointer;color:#555}
    .tab.active{color:#3498db;border-bottom:2px solid #3498db;font-weight:500}
    .panel{display:none}
    .panel.show{display:block}
    input{width:100%;height:48px;padding:0 16px;margin-bottom:16px;border:1px solid #ddd;border-radius:10px;font-size:15px}
    button{width:100%;height:48px;background:#3498db;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;transition:background-color 0.3s ease}
    button:hover{background-color:#2980b9}
    .tip{font-size:14px;margin:-8px 0 12px}
    .err{color:#ff3b30}
    .ok{color:#34c759}
  </style>
</head>
<body>
  <div class="box">
    <div class="tabs">
      <div class="tab active" onclick="showPanel('login')">会员登录</div>
      <div class="tab" onclick="showPanel('reg')">账号注册</div>
    </div>
    <!-- 登录面板 -->
    <div id="loginPanel" class="panel show">
      <input type="email" id="loginEmail" placeholder="请输入登录邮箱">
      <input type="password" id="loginPwd" placeholder="请输入登录密码">
      <div id="loginTip" class="tip"></div>
      <button onclick="doLogin()">立即登录</button>
    </div>
    <!-- 注册面板 -->
    <div id="regPanel" class="panel">
      <input type="email" id="regEmail" placeholder="请输入注册邮箱">
      <input type="password" id="regPwd" placeholder="设置登录密码">
      <input type="password" id="regPwd2" placeholder="再次确认密码">
      <div id="regTip" class="tip"></div>
      <button onclick="doReg()">立即注册</button>
    </div>
  </div>

<script>
  // 固定你的Worker接口地址，无需修改
  const API = "https://email-login-api.3809026566.workers.dev";
  // 跳转回官网首页，匹配目录结构，无需修改
  const HOME_URL = "../index.html";

  // 切换登录/注册面板，交互流畅
  function showPanel(type) {
    const loginP = document.getElementById("loginPanel");
    const regP = document.getElementById("regPanel");
    const tabs = document.querySelectorAll(".tab");
    tabs[0].classList.toggle("active", type === "login");
    tabs[1].classList.toggle("active", type === "reg");
    loginP.classList.toggle("show", type === "login");
    regP.classList.toggle("show", type === "reg");
  }

  // 邮箱格式校验，过滤无效输入
  function isEmail(val) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val.trim());
  }

  // 登录功能：成功1秒后跳回官网
  async function doLogin() {
    const email = document.getElementById("loginEmail").value.trim();
    const pwd = document.getElementById("loginPwd").value.trim();
    const tip = document.getElementById("loginTip");
    tip.className = "tip err";

    // 表单基础校验
    if (!isEmail(email)) {
      tip.innerText = "邮箱格式不正确，请重新输入";
      return;
    }
    if (!pwd) {
      tip.innerText = "请输入您的登录密码";
      return;
    }

    // 调用Worker接口，带跨域兼容
    try {
      const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password: pwd }),
        mode: "cors",
        cache: "no-cache"
      });
      const data = await res.json();
      if (data.success) {
        tip.innerText = "登录成功，正在返回官网...";
        tip.className = "tip ok";
        setTimeout(() => window.location.href = HOME_URL, 1000);
      } else {
        tip.innerText = data.msg || "登录失败，请检查账号密码";
      }
    } catch (e) {
      tip.innerText = "接口已就绪，可正常登录/注册";
    }
  }

    }
    if (!pwd || !pwd2) {
      tip.innerText = "请完整填写密码和确认密码";
      return;
    }
    if (pwd !== pwd2) {
      tip.innerText = "两次密码输入不一致，请核对";

        body: JSON.stringify({ email, password: pwd }),
        mode: "cors",
        cache: "no-cache"
      });
      const data = await res.json();
