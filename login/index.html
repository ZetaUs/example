<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, -apple-system, sans-serif}
    body{background:#f6f8fa;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
    .box{max-width:400px;width:100%;background:#fff;border-radius:14px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
    .tabs{display:flex;margin-bottom:24px;border-bottom:1px solid #eee}
    .tab{flex:1;text-align:center;padding:12px;font-size:16px;cursor:pointer;color:#555;user-select:none}
    .tab.active{color:#0071e3;border-bottom:2px solid #0071e3;font-weight:500}
    .panel{display:none}
    .panel.show{display:block}
    input{width:100%;height:48px;padding:0 16px;margin-bottom:16px;border:1px solid #ddd;border-radius:10px;font-size:15px}
    button{width:100%;height:48px;background:#0071e3;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer}
    .tip{font-size:14px;margin:-8px 0 12px;color:#ff3b30}
    .tip.ok{color:#34c759}
  </style>
</head>
<body>
  <div class="box">
    <div class="tabs">
      <div class="tab active" id="tabLogin">会员登录</div>
      <div class="tab" id="tabReg">账号注册</div>
    </div>

    <div id="loginPanel" class="panel show">
      <input type="email" id="loginEmail" placeholder="请输入邮箱">
      <input type="password" id="loginPwd" placeholder="请输入密码">
      <div id="loginTip" class="tip"></div>
      <button id="btnLogin">立即登录</button>
    </div>

    <div id="regPanel" class="panel">
      <input type="email" id="regEmail" placeholder="请输入邮箱">
      <input type="password" id="regPwd" placeholder="请设置密码">
      <input type="password" id="regPwd2" placeholder="请确认密码">
      <div id="regTip" class="tip"></div>
      <button id="btnReg">立即注册</button>
    </div>
  </div>

<script>
  // 固定你的Worker接口地址
  const API = "https://email-login-api.3809026566.workers.dev";
  // 登录/注册成功后跳回官网
  const HOME_URL = "../index.html";

  // 页面加载完成后绑定所有事件
  window.addEventListener('load', function() {
    // 获取所有DOM元素
    const tabLogin = document.getElementById('tabLogin');
    const tabReg = document.getElementById('tabReg');
    const loginPanel = document.getElementById('loginPanel');
    const regPanel = document.getElementById('regPanel');
    const btnLogin = document.getElementById('btnLogin');
    const btnReg = document.getElementById('btnReg');
    const loginTip = document.getElementById('loginTip');
    const regTip = document.getElementById('regTip');

    // 标签切换逻辑
    tabLogin.onclick = function() {
      tabLogin.classList.add('active');
      tabReg.classList.remove('active');
      loginPanel.classList.add('show');
      regPanel.classList.remove('show');
      loginTip.innerText = '';
      regTip.innerText = '';
    };
    tabReg.onclick = function() {
      tabReg.classList.add('active');
      tabLogin.classList.remove('active');
      regPanel.classList.add('show');
      loginPanel.classList.remove('show');
      loginTip.innerText = '';
      regTip.innerText = '';
    };

    // 邮箱格式校验
    function isEmail(val) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val.trim());
    }

    // 登录按钮逻辑
    btnLogin.onclick = async function() {
      const email = document.getElementById('loginEmail').value.trim();
      const pwd = document.getElementById('loginPwd').value.trim();
      loginTip.className = 'tip';

      if (!isEmail(email)) {
        loginTip.innerText = '邮箱格式不正确';
        return;
      }
      if (!pwd) {
        loginTip.innerText = '请输入密码';
        return;
      }

      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pwd }),
          mode: 'cors',
          credentials: 'omit'
        });
        const data = await res.json();
        if (data.success) {
          loginTip.className = 'tip ok';
          loginTip.innerText = '登录成功，正在跳转...';
          setTimeout(() => window.location.href = HOME_URL, 1000);
        } else {
          loginTip.innerText = data.msg || '登录失败';
        }
      } catch (e) {
        loginTip.innerText = '接口正常，请检查输入';
        console.error(e);
      }
    };

    // 注册按钮逻辑
    btnReg.onclick = async function() {
      const email = document.getElementById('regEmail').value.trim();
      const pwd = document.getElementById('regPwd').value.trim();
      const pwd2 = document.getElementById('regPwd2').value.trim();
      regTip.className = 'tip';

      if (!isEmail(email)) {
        regTip.innerText = '邮箱格式不正确';
        return;
      }
      if (!pwd || !pwd2) {
        regTip.innerText = '请填写完整密码';
        return;
      }
      if (pwd !== pwd2) {
        regTip.innerText = '两次密码不一致';
        return;
      }
