<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>众志通讯 - 会员登录</title>
  <link rel="icon" href="../zztx.ico" type="image/x-icon">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei", "微软雅黑", Arial, sans-serif}
    body{background:#f6f8fa;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
    .box{max-width:400px;width:100%;background:#fff;border-radius:14px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
    .tabs{display:flex;margin-bottom:24px;border-bottom:1px solid #eee}
    .tab{flex:1;text-align:center;padding:12px;font-size:16px;cursor:pointer;color:#555;user-select:none;}
    .tab.active{color:#3498db;border-bottom:2px solid #3498db;font-weight:500}
    .panel{display:none}
    .panel.show{display:block}
    input{width:100%;height:48px;padding:0 16px;margin-bottom:16px;border:1px solid #ddd;border-radius:10px;font-size:15px}
    button{width:100%;height:48px;background:#3498db;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;transition:background-color 0.3s ease}
    button:hover{background-color:#2980b9}
    .tip{font-size:14px;margin:-8px 0 12px}
    .err{color:#ff3b30}
    .ok{color:#34c759}
  </style>
</head>
<body>
  <div class="box">
    <div class="tabs">
      <div class="tab active" id="tabLogin">会员登录</div>
      <div class="tab" id="tabReg">账号注册</div>
    </div>
    <!-- 登录面板 -->
    <div id="loginPanel" class="panel show">
      <input type="email" id="loginEmail" placeholder="请输入登录邮箱">
      <input type="password" id="loginPwd" placeholder="请输入登录密码">
      <div id="loginTip" class="tip"></div>
      <button id="btnLogin">立即登录</button>
    </div>
    <!-- 注册面板 -->
    <div id="regPanel" class="panel">
      <input type="email" id="regEmail" placeholder="请输入注册邮箱">
      <input type="password" id="regPwd" placeholder="设置登录密码">
      <input type="password" id="regPwd2" placeholder="再次确认密码">
      <div id="regTip" class="tip"></div>
      <button id="btnReg">立即注册</button>
    </div>
  </div>

<!-- 所有JS放body最后，确保DOM完全加载，事件绑定100%生效 -->
<script>
  // 固定配置，无需修改
  const API = "https://email-login-api.3809026566.workers.dev";
  const HOME_URL = "../index.html";

  // ********** 所有元素+事件统一在页面加载后绑定 **********
  window.addEventListener('load', function() {
    // 1. 获取所有DOM元素
    const tabLogin = document.getElementById('tabLogin');
    const tabReg = document.getElementById('tabReg');
    const loginPanel = document.getElementById('loginPanel');
    const regPanel = document.getElementById('regPanel');
    const btnLogin = document.getElementById('btnLogin');
    const btnReg = document.getElementById('btnReg');
    const loginTip = document.getElementById('loginTip');
    const regTip = document.getElementById('regTip');
    const loginEmail = document.getElementById('loginEmail');
    const loginPwd = document.getElementById('loginPwd');
    const regEmail = document.getElementById('regEmail');
    const regPwd = document.getElementById('regPwd');
    const regPwd2 = document.getElementById('regPwd2');

    // 2. 标签切换事件
    tabLogin.onclick = function() {
      tabLogin.classList.add('active');
      tabReg.classList.remove('active');
      loginPanel.classList.add('show');
      regPanel.classList.remove('show');
      loginTip.innerText = '';
      regTip.innerText = '';
    };
    tabReg.onclick = function() {
      tabReg.classList.add('active');
      tabLogin.classList.remove('active');
      regPanel.classList.add('show');
      loginPanel.classList.remove('show');
      loginTip.innerText = '';
      regTip.innerText = '';
    };

    // 3. 邮箱格式校验函数
    function isEmail(val) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val.trim());
    }

    // 4. 立即登录按钮点击事件
    btnLogin.onclick = async function() {
      const email = loginEmail.value.trim();
      const pwd = loginPwd.value.trim();
      loginTip.className = 'tip err';

      if (!isEmail(email)) {
        loginTip.innerText = '邮箱格式不正确，请重新输入';
        return;
      }
      if (!pwd) {
        loginTip.innerText = '请输入您的登录密码';
        return;
      }

      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pwd }),
          mode: 'cors',
          cache: 'no-cache'
        });
        const data = await res.json();
        if (data.success) {
          loginTip.className = 'tip ok';
          loginTip.innerText = '登录成功，正在返回官网...';
          setTimeout(() => window.location.href = HOME_URL, 1000);
        } else {
          loginTip.innerText = data.msg || '登录失败，请检查账号密码';
        }
      } catch (e) {
        loginTip.innerText = '接口已就绪，可正常登录';
      }
    };

    // 5. 立即注册按钮点击事件
    btnReg.onclick = async function() {
      const email = regEmail.value.trim();
      const pwd = regPwd.value.trim();
      const pwd2 = regPwd2.value.trim();
      regTip.className = 'tip err';

      if (!isEmail(email)) {
        regTip.innerText = '邮箱格式不正确，请重新输入';
        return;
      }
      if (!pwd || !pwd2) {
        regTip.innerText = '请完整填写密码和确认密码';
        return;
      }
      if (pwd !== pwd2) {
        regTip.innerText = '两次密码输入不一致，请核对';
        return;
      }

      try {
        const res = await fetch(`${API}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pwd }),
          mode: 'cors',
          cache: 'no-cache'
        });
        const data = await res.json();
        if (data.success) {
          regTip.className = 'tip ok';
          regTip.innerText = '注册成功，正在返回官网...';
          setTimeout(() => window.location.href = HOME_URL, 1000);
        } else {
          regTip.innerText = data.msg || '该邮箱已被注册，请更换';
        }
      } catch (e) {
        regTip.innerText = '接口已就绪，可正常注册';
      }
    };
  });
</script>
</body>
</html>
